<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 Save the Sunshine Playroom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#FEF9F0;min-height:100vh}
.c{background:#fff;border-radius:18px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:24px;margin-bottom:14px}
.hdr{background:#fff;border-bottom:2px solid #F0F0F0;padding:10px 0;position:sticky;top:0;z-index:20}
.inn{max-width:760px;margin:0 auto;padding:0 18px}
.ok{background:#EDFAEF;border:2px solid #6BCB77;border-radius:12px;padding:12px;font-weight:700;color:#1A7A27;margin-bottom:10px}
.ko{background:#FFF0F0;border:2px solid #FF6B6B;border-radius:12px;padding:12px;font-weight:700;color:#9A2020;margin-bottom:10px}
.scpill{background:linear-gradient(135deg,#FFD93D,#FF9F43);color:#fff;padding:5px 15px;border-radius:50px;font-weight:800;font-size:.9rem}
input{font-family:inherit;border:2px solid #E8E8E8;border-radius:10px;padding:10px 13px;font-size:.93rem;width:100%;outline:none}
input:focus{border-color:#4ECDC4;box-shadow:0 0 0 3px rgba(78,205,196,.12)}
.opt{display:flex;align-items:center;gap:9px;padding:11px 14px;border:2px solid #E8E8E8;border-radius:12px;margin-bottom:8px;cursor:pointer;font-weight:600;font-size:.91rem;transition:border-color .15s,background .15s}
.opt:hover{border-color:#4ECDC4;background:#F0FFFE}
.vfr{display:flex;align-items:center;gap:8px;padding:9px 12px;border:2px solid #E8E8E8;border-radius:12px;margin-bottom:7px;flex-wrap:wrap}
.mi{padding:10px 12px;border:2px solid #E8E8E8;border-radius:11px;cursor:pointer;font-weight:600;font-size:.85rem;min-height:50px;display:flex;align-items:center;margin-bottom:7px;transition:border-color .15s,background .15s}
.mi:hover{border-color:#C77DFF;background:#F9F0FF}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tag{display:inline-flex;align-items:center;padding:3px 12px;border-radius:50px;font-size:.76rem;font-weight:800}
.sit{background:linear-gradient(135deg,#E8F7FE,#EDF8F0);border:2px solid #4ECDC4;border-radius:14px;padding:18px}
.slbl{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#4ECDC4;margin-bottom:2px}
.sval{font-weight:600;font-size:.92rem;margin-bottom:11px;line-height:1.5}
.hint{background:#FFF8E1;border:2px dashed #FFD93D;border-radius:11px;padding:10px 13px;font-size:.85rem;font-weight:700;color:#7A5700}
.rtxt{background:#FFF8EE;border-left:4px solid #FF9F43;padding:14px;border-radius:0 12px 12px 0;font-size:.88rem;line-height:1.75;margin-bottom:14px}
.ibx{background:#FF9F43;border-radius:18px;padding:24px;text-align:center;margin-bottom:14px}
.prg{display:flex;align-items:center}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.mbox{background:#fff;border-radius:20px;padding:26px;width:100%;max-width:400px}
@media(max-width:560px){.mg{grid-template-columns:1fr}.inn{padding:0 12px}.c{padding:18px;border-radius:14px}}
@media print{.noprint{display:none!important}}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ═══ DATA ═══ */
const Q1=[
  {q:'What is a "toy"?',o:['A book to read','An object to play with','A piece of clothing','A food for babies'],c:1},
  {q:'A child falls. What do you do first?',o:['You call a parent right away','You give them some food','You ask them to stand up','You check if they are hurt'],c:3},
  {q:'What is a "nursery"?',o:['A place for young children','A room in a hospital','A class for teenagers','A garden with flowers'],c:0},
  {q:'What does "routine" mean?',o:['A special fun event','A game for children','A regular daily schedule','A creative activity'],c:2},
  {q:'Which activity is good for children aged 3-5?',o:['Reading a long novel','Painting and drawing','Driving a bicycle alone','Cooking a full meal'],c:1},
  {q:'What does "assist" mean?',o:['To sing a lullaby','To play with toys','To eat a snack','To help someone'],c:3},
  {q:'How old is a "toddler"?',o:['Between 1 and 3 years old','Between 5 and 7 years old','Between 8 and 10 years old','Between 10 and 12 years old'],c:0},
  {q:'What is "story time"?',o:['Time to eat lunch','Time to have a nap','Time to listen to a story','Time to play outside'],c:2},
  {q:'A child says: "I want my mummy!" What do you say?',o:['She is at work now.','Don\'t worry. She will come soon.','Please go to your seat.','You can call her yourself.'],c:1},
  {q:'What is a "playground"?',o:['A room for sleeping','A place for cooking','A space for meetings','An outdoor area to play'],c:3}
];
const Q2=[
  {q:'What is a "lullaby"?',o:['A type of outdoor game','A picture made with paint','A song to help a child sleep','A small toy for babies'],c:2},
  {q:'What does "clap" mean?',o:['To hit your hands together','To jump up and down','To shake your head left and right','To stamp your feet on the floor'],c:0},
  {q:'What is "circle time"?',o:['A time to eat a snack','A time to have a nap','A time to do craft','A time to sit and talk in a group'],c:3},
  {q:'What does "creative" mean?',o:['Tired and very bored','Good at making new things','Shy and very quiet','Loud and very active'],c:1},
  {q:'What is a "nursery rhyme"?',o:['A painting for young children','A game with balls outside','A short poem or song for children','A type of food for toddlers'],c:2},
  {q:'What does "gentle" mean?',o:['Soft and kind in your actions','Loud and very energetic','Fast and very active','Tired and very sleepy'],c:0},
  {q:'What does "sing" mean?',o:['To draw a picture','To run in the garden','To build with blocks','To make music with your voice'],c:3},
  {q:'What is "imagination"?',o:['A game for older children','The ability to create new ideas in your mind','A song played on an instrument','A daily routine for toddlers'],c:1},
  {q:'What does "kind" mean?',o:['Nice and caring to others','Shy and not very talkative','Fast and very energetic','Loud and sometimes difficult'],c:0},
  {q:'A child is sad. What do you do?',o:['You ignore them','You ask them to be quiet','You call the director','You go to them and listen'],c:3}
];
const T1=`Today is Monday. It is 9 o'clock. The children arrive at the Sunshine Playroom. There are ten children, aged 3 to 5.

The activity leader, Emma, says: "Good morning, everyone!" The children sit in a circle. Emma reads a story about a little bear. The children listen and look at the pictures.

After the story, it is craft time. The children paint with red, blue, and yellow paint. Tom paints a sun. Lea paints a flower. Emma helps the children who need help.

At 12 o'clock, it is lunchtime. The children eat sandwiches and fruit. After lunch, it is nap time. The children rest for 30 minutes.`;
const VF=[
  {s:"Today is Tuesday.",a:false},{s:"There are ten children.",a:true},
  {s:"The children are aged 3 to 5.",a:true},{s:"Emma reads a story about a dog.",a:false},
  {s:"Emma is the activity leader.",a:true},{s:"After the story, children play football.",a:false},
  {s:"The children use three colours.",a:true},{s:"Tom paints a flower.",a:false},
  {s:"Lunchtime is at 12 o'clock.",a:true},{s:"After lunch, children play outside.",a:false}
];
const T2=`It is 2 o'clock. The children wake up after their nap. The activity leader, Marc, prepares a music session. He has a guitar, a tambourine, and some maracas.

The children sit in a circle. Marc plays the guitar. The children sing a song about animals: a dog, a cat, and a duck. They clap their hands and dance.

After the session, it is snack time. The children eat apples and biscuits. They drink water or orange juice. At 4 o'clock, the children play in the garden. At 5 o'clock, parents come to collect them.`;
const Q3=[
  {q:"What time does the afternoon start?",o:["2 o'clock","1 o'clock","3 o'clock","4 o'clock"],c:0},
  {q:"What is Marc's role?",o:["Director","Activity leader","Cook","Doctor"],c:1},
  {q:"Which instrument does Marc play?",o:["Piano","Drums","Guitar","Flute"],c:2},
  {q:"How many instruments are mentioned?",o:["One","Two","Four","Three"],c:3},
  {q:"What do the children sing about?",o:["Animals","Colors","Food","Sports"],c:0},
  {q:"What do the children do during the song?",o:["Sleep","Clap and dance","Paint","Eat"],c:1},
  {q:"What do children eat at snack time?",o:["Sandwiches and juice","Fruit and yogurt","Apples and biscuits","Biscuits and milk"],c:2},
  {q:"What do the children drink?",o:["Milk or juice","Water or milk","Apple juice or milk","Water or orange juice"],c:3},
  {q:"What do children do at 4 o'clock?",o:["Play in the garden","Nap","Eat","Sing"],c:0},
  {q:"When do parents arrive?",o:["At 3 o'clock","At 5 o'clock","At 4 o'clock","At 6 o'clock"],c:1}
];
const SIT=[
  {e:'🎨',t:'Situation Card #1',w:'Sunshine Playroom — Art corner',who:"Leo, 4 years old. He is sad. He doesn't want to paint. He wants to go home.",r:'Activity leader. Talk to Leo. Help him feel better and join the group.',h:'Think about: his feelings / what you can offer / how you bring him into the activity.'},
  {e:'📚',t:'Situation Card #2 — Rattrapage',w:'Sunshine Playroom — Story corner',who:'8 children, aged 3–4. It is story time.',r:'Activity leader. Start the session. Welcome the children. Present the book.',h:'Think about: how you greet a group / what to say about the activity / how to engage the children.'}
];
const M1=[
  {w:'Schedule',d:'A plan showing what happens and when'},
  {w:'Welcome',d:'To say hello and make someone feel at home'},
  {w:'Safety',d:'Making sure no one is hurt or in danger'},
  {w:'Calm',d:'Quiet, relaxed, and not stressed'},
  {w:'Team',d:'A group of people working together'},
  {w:'Outdoor',d:'Happening outside, in the open air'},
  {w:'Indoor',d:'Happening inside a building'},
  {w:'Encourage',d:'To help someone feel able to try something'},
  {w:'Comfort',d:'To make someone feel better when sad'},
  {w:'Responsible',d:'Taking care of something important'}
];
const M2=[
  {w:'Feeling',d:'An emotion, like happy, sad, or angry'},
  {w:'Behaviour',d:'The way a person acts with others'},
  {w:'Friend',d:'Someone you like and spend time with'},
  {w:'Participate',d:'To join in and take part in an activity'},
  {w:'Discover',d:'To find or learn something for the first time'},
  {w:'Express',d:'To show what you think or feel'},
  {w:'Cooperate',d:'To work well with other people'},
  {w:'Support',d:'To be there for someone who needs help'},
  {w:'Concentrate',d:'To give all your attention to something'},
  {w:'Achieve',d:'To do something successfully'}
];
const REP=[
  {e:'🩹',t:'Incident Report #1',i:'Play area | Monday 10:30 AM',x:"Tom (5 years old) falls in the play area. He hurts his knee. The activity leader goes to Tom immediately. Tom cries. The activity leader cleans his knee and puts a bandage on it. Tom feels better after 5 minutes. His mother is called at 10:45. She arrives at 11:30. Tom goes home. The incident is recorded.",h:'Cover: who / what happened / when / actions taken / result.'},
  {e:'🧸',t:'Incident Report #2 — Rattrapage',i:'Garden | Monday 2:30 PM',x:"Lea (4) and Nora (4) have an argument. Lea takes Nora's ball. Nora cries. The activity leader comes and speaks calmly to both children. Lea says sorry. The activity leader gives Nora a new ball. They play together again.",h:'Cover: who / what happened / what the activity leader did / final result.'},
  {e:'🎨',t:'Incident Report #3 — 2e Rattrapage',i:'Classroom | Monday 3:00 PM',x:"During craft time, Sam (3) puts paint in his mouth. The activity leader sees this. She takes the paint and checks his mouth. The paint is not dangerous. She contacts Sam's parents. Sam drinks water and continues. The parents are not worried.",h:'Cover: what happened / immediate action / child safe / parents informed.'}
];
const WW=['WE','PLAY','AND','LEARN','TOGETHER'];

/* ═══ STATE ═══ */
let S={
  scr:'home',tc:'0504',sc:'1234',
  g:{n:'',p:[]},pts:0,sh:[],rv:[],res:{},wr:[],
  t0:null,t1:null,l2s1:null,l3i:0,l5i:0,np:1
};
let E={};// exercise state
let F={};// form inputs cache
let showModal=false;

const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;};
const pass=(n,t=10)=>n>=t*.8;
const ftm=(s,e)=>{if(!s||!e)return'—';const d=Math.round((e-s)/1e3);return`${0|d/60}min ${d%60}s`;};

/* ═══ RENDER ═══ */
function go(scr,ei={}){E=ei;S.scr=scr;render();}
function render(){
  document.getElementById('app').innerHTML=view();
  document.getElementById('app').scrollTop=0;
  window.scrollTo(0,0);
}

/* ═══ BUTTONS ═══ */
const BC={coral:['#FF6B6B','#C83F3F','#fff'],yellow:['#FFD93D','#E0AC00','#333'],teal:['#4ECDC4','#28A098','#fff'],green:['#6BCB77','#3E9948','#fff'],purple:['#C77DFF','#8B40CC','#fff'],orange:['#FF9F43','#CC6C10','#fff'],gray:['#E0E0E0','#CCC','#555']};
function btn(txt,fn,clr='coral',full=false,sm=false){
  const[bg,sh,c]=BC[clr]||BC.gray;
  const w=full?'width:100%;justify-content:center;':'';
  const sz=sm?'font-size:.8rem;padding:7px 14px;':'font-size:.88rem;padding:9px 20px;';
  return `<button onclick="${fn}" style="background:${bg};color:${c};box-shadow:0 3px 0 ${sh};${w}${sz}border:none;cursor:pointer;font-weight:800;border-radius:50px;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:transform .1s" onmousedown="this.style.transform='scale(.97)'" onmouseup="this.style.transform='scale(1)'">${txt}</button>`;
}
function hdr(lvl){
  const ls=[['📝','Vocab'],['📖','Lecture'],['🎤','Oral'],['🔗','Match'],['📋','Rapport']];
  const st=ls.map(([e,l],i)=>
    `${i>0?`<div style="flex:1;height:3px;background:${i<lvl?'#6BCB77':'#E8E8E8'};margin:0 2px"></div>`:''}
    <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="width:30px;height:30px;border-radius:50%;background:${i+1<lvl?'#6BCB77':i+1===lvl?'#FFD93D':'#E8E8E8'};color:${i+1<=lvl?'#333':'#BBB'};display:flex;align-items:center;justify-content:center;font-size:${i+1<lvl?'.82':'1'}rem;font-weight:800${i+1===lvl?';box-shadow:0 0 0 3px #FFE98A':''}">
        ${i+1<lvl?'✓':e}</div>
      <span style="font-size:.58rem;color:#AAA">${l}</span>
    </div>`).join('');
  return `<div class="hdr noprint">
    <div class="inn" style="display:flex;align-items:center;gap:12px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
          <span style="color:#FF6B6B;font-weight:800;font-size:.88rem;white-space:nowrap">☀️ Sunshine Playroom</span>
          <span style="color:#AAA;font-size:.76rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">• ${S.g.n}</span>
        </div>
        <div class="prg">${st}</div>
      </div>
      <div class="scpill">⭐ ${S.pts} pts</div>
    </div>
  </div>`;
}
function wrap(h,lvl){return hdr(lvl)+`<div class="inn" style="padding-top:16px;padding-bottom:30px">${h}</div>`;}
function indice(idx){
  const w=WW[S.sh[idx]];
  if(!S.rv.includes(w))S.rv.push(w);
  const chips=S.rv.map(x=>`<span style="background:#FF9F43;color:#fff;padding:6px 15px;border-radius:50px;font-weight:800;display:inline-block;margin:3px">${x}</span>`).join('');
  const empty=Array.from({length:5-S.rv.length}).map(()=>'<span style="background:#E8E8E8;color:#BBB;padding:6px 15px;border-radius:50px;font-weight:800;display:inline-block;margin:3px">?</span>').join('');
  return `<div class="ibx">
    <div style="font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.8);margin-bottom:5px">Mot secret</div>
    <div style="font-size:2.5rem;font-weight:800;color:#fff;letter-spacing:.06em">${w}</div>
    <div style="color:rgba(255,255,255,.75);font-size:.82rem;margin-top:7px">📝 Notez ce mot sur votre feuille !</div>
  </div>
  <div class="c">
    <div style="font-weight:800;color:#FF9F43;margin-bottom:9px">🧩 Fragments collectés (${S.rv.length}/5)</div>
    <div>${chips}${empty}</div>
    <p style="color:#888;font-size:.78rem;margin-top:9px">Les 5 mots forment une phrase !</p>
  </div>`;
}
function lvlIntro(e,t,s,desc,fn){
  return `<div class="c">
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-size:2.8rem">${e}</div>
      <h2 style="font-size:1.6rem;font-weight:800;color:#FF6B6B;margin-top:5px">${t}</h2>
      <p style="color:#FF9F43;font-weight:700;font-size:.88rem;margin-top:4px">${s}</p>
    </div>
    <div style="background:#FFF8EE;border-radius:11px;padding:14px;margin-bottom:18px">${desc}</div>
    <div style="text-align:center">${btn("C'est parti ! 🎯",fn,'coral')}</div>
  </div>`;
}

/* ═══ SCREEN BUILDER ═══ */
function view(){
  const sc=S.scr;
  if(sc==='home')return vHome();
  if(sc==='rgpd')return vRGPD();
  if(sc==='tlg')return vLogin('👩‍🏫 Interface Professeur','tdb');
  if(sc==='tdb')return vTeacher();
  if(sc==='slg')return vLogin('👨‍🎓 Connexion Élèves','grp');
  if(sc==='grp')return vGroup();
  if(sc==='l1i')return wrap(lvlIntro('📝','Niveau 1 — Induction Room','Vocabulaire',
    '<p style="font-weight:700;margin-bottom:7px">Welcome to the Sunshine Playroom!</p><p style="color:#666;font-size:.9rem">10 questions de vocabulaire. Seuil ≥ 8/10 • ⏱ 7 minutes</p>',
    "go('l1q1',{qs:Q1,cur:0,ans:{},done:false,lbl:'L1-Ex1'})"),1);
  if(sc==='l1q1')return wrap(`<div class="c"><span class="tag" style="background:#FF6B6B;color:#fff;margin-bottom:12px">Ex. 1</span> <strong>QCM Vocabulaire</strong><hr style="margin:12px 0;border:none;border-top:1px solid #F0F0F0">${vQCM()}</div>`,1);
  if(sc==='l1q2')return wrap(`<div class="ko">💪 Score insuffisant — exercice de rattrapage !</div><div class="c"><span class="tag" style="background:#FF9F43;color:#fff;margin-bottom:12px">Rattrapage</span> <strong>QCM Vocabulaire (2)</strong><hr style="margin:12px 0;border:none;border-top:1px solid #F0F0F0">${vQCM()}</div>`,1);
  if(sc==='l1d')return wrap(indice(0)+btn('Niveau suivant →',"go('l2i')",'yellow',true),1);
  if(sc==='l2i')return wrap(lvlIntro('📖','Niveau 2 — Intelligence Desk','Compréhension écrite',
    '<p style="font-weight:700;margin-bottom:7px">A file has been found!</p><p style="color:#666;font-size:.9rem">Les 2 exercices sont <strong>obligatoires</strong>. ≥ 8/10 aux deux pour avancer.</p><p style="color:#FF6B6B;font-weight:700;font-size:.86rem;margin-top:7px">⚠️ Échec = −25 pts + retour Niveau 1</p>',
    "go('l2vf',{qs:VF,text:T1,ans:{},done:false})"),2);
  if(sc==='l2vf')return wrap(`<div class="c"><span class="tag" style="background:#4ECDC4;color:#fff;margin-bottom:12px">Ex. 1/2</span> <strong>Vrai / Faux</strong><hr style="margin:12px 0;border:none;border-top:1px solid #F0F0F0">${vVF()}</div>`,2);
  if(sc==='l2qm')return wrap(`<div class="c"><span class="tag" style="background:#4ECDC4;color:#fff;margin-bottom:12px">Ex. 2/2</span> <strong>QCM — Texte 2</strong><hr style="margin:12px 0;border:none;border-top:1px solid #F0F0F0"><div class="rtxt"><strong style="color:#FF9F43">Afternoon at the Sunshine Playroom</strong><br><br>${T2.replace(/\n\n/g,'<br><br>')}</div>${vQCM()}</div>`,2);
  if(sc==='l2fl')return wrap(`<div class="c" style="text-align:center;padding:30px 20px"><div style="font-size:2.5rem;margin-bottom:8px">😅</div><h2 style="color:#FF6B6B;font-weight:800;margin-bottom:10px">Score insuffisant</h2><p style="color:#666;margin-bottom:14px">≥ 80% requis aux deux exercices.</p><div class="ko">−25 points appliqués • Retour Niveau 1</div><br>${btn('🔄 Retour Niveau 1',"go('l1i')",'coral',true)}</div>`,2);
  if(sc==='l2d')return wrap(indice(1)+btn('Niveau suivant →',"go('l3i')",'yellow',true),2);
  if(sc==='l3i')return wrap(lvlIntro('🎤','Niveau 3 — Situation Room','Expression orale',
    '<p style="font-weight:700;margin-bottom:7px">It\'s your turn to speak!</p><p style="color:#666;font-size:.9rem">Un membre est tiré au sort. Il lit la carte et parle en anglais.</p><p style="color:#666;font-style:italic;font-size:.88rem;margin-top:7px">⚠️ No notes. No preparation. Use your own words!</p>',
    "startOral()"),3);
  if(sc==='l3or')return wrap(vOral(SIT[S.l3i||0]),3);
  if(sc==='l3d')return wrap(indice(2)+btn('Niveau suivant →',"go('l4i')",'yellow',true),3);
  if(sc==='l4i')return wrap(lvlIntro('🔗','Niveau 4 — The Programme Room','Correspondance',
    '<p style="font-weight:700;margin-bottom:7px">The programme files are scrambled!</p><p style="color:#666;font-size:.9rem">Associez chaque mot à sa définition. ⏱ 6 min recommandées • ≥ 8/10</p>',
    "go('l4e1',{ps:M1,sh:shuf(M1.map((_,i)=>i)),sel:null,mt:{},done:false,lbl:'L4-Ex1'})"),4);
  if(sc==='l4e1')return wrap(`<div class="c"><span class="tag" style="background:#C77DFF;color:#fff;margin-bottom:12px">Ex. 1</span> <strong>Correspondance — Série 1</strong><hr style="margin:12px 0;border:none;border-top:1px solid #F0F0F0">${vMatch()}</div>`,4);
  if(sc==='l4e2')return wrap(`<div class="ko">💪 Rattrapage — nouvelle série !</div><div class="c"><span class="tag" style="background:#FF9F43;color:#fff;margin-bottom:12px">Rattrapage</span> <strong>Correspondance — Série 2</strong><hr style="margin:12px 0;border:none;border-top:1px solid #F0F0F0">${vMatch()}</div>`,4);
  if(sc==='l4d')return wrap(indice(3)+btn('Niveau suivant →',"go('l5i')",'yellow',true),4);

/* ═══ QCM ═══ */
function vQCM(){
  const{qs,cur=0,ans={},done=false}=E;
  if(!qs)return'';

    const c=done?(ans[i]===qs[i].c?'#6BCB77':'#FF6B6B'):(ans[i]!=null?'#4ECDC4':'#DDD');
    return `<div onclick="E.cur=${i};render()" style="width:9px;height:9px;border-radius:50%;background:${c};cursor:pointer;display:inline-block;margin:2px"></div>`;
  }).join('');
  const opts=q.o.map((opt,oi)=>{
    let bc='#E8E8E8',bg='#fff';
    if(ans[cur]===oi){bc='#4ECDC4';bg='#E5F9F8';}
    if(done&&oi===q.c){bc='#6BCB77';bg='#EDFAEF';}
    if(done&&ans[cur]===oi&&oi!==q.c){bc='#FF6B6B';bg='#FFF0F0';}
    const cbg=ans[cur]===oi?CC[oi]:'#F0F0F0',ct=ans[cur]===oi?'#fff':'#999';
    const mk=done?(oi===q.c?' ✓':(ans[cur]===oi?' ✗':'')):'';
    return `<div class="opt" onclick="${done?'':`E.ans[${cur}]=${oi};render()`}" style="border-color:${bc};background:${bg}">
      <div style="width:28px;height:28px;border-radius:50%;background:${cbg};color:${ct};display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;flex-shrink:0">${L[oi]}</div>
      <span style="flex:1">${opt}</span><span>${mk}</span>
    </div>`;
  }).join('');
  const allA=Object.keys(ans).length===qs.length;
  const score=qs.filter((_,i)=>ans[i]===qs[i].c).length;
  const bot=done
    ?`<div style="display:flex;gap:10px;width:100%;align-items:center;flex-wrap:wrap">
       <div class="${score>=8?'ok':'ko'}" style="flex:1;margin:0">${score}/${qs.length} ${score>=8?'✓ Réussi !':'✗ Insuffisant'}</div>
       ${btn('Continuer →','qcmDone()','green')}</div>`
    :(allA?btn('✅ Valider','E.done=true;render()','coral'):`<small style="color:#CCC;font-size:.8rem">${Object.keys(ans).length}/${qs.length} répondues</small>`);
  return `<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">
      <span style="color:#AAA;font-size:.82rem;font-weight:700">Question ${cur+1}/${qs.length}</span>
      <div>${dots}</div>
    </div>
    <div style="background:#FFF8EE;border-radius:11px;padding:13px;margin-bottom:12px;font-weight:700;font-size:.93rem">${q.q}</div>
    ${opts}
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:space-between;align-items:center;flex-wrap:wrap">
      <div style="display:flex;gap:7px">
        ${cur>0?btn('← Préc.',`E.cur=${cur-1};render()`,'gray',false,true):''}
        ${cur<qs.length-1?btn('Suiv. →',`E.cur=${cur+1};render()`,'teal',false,true):''}
      </div>
      ${bot}
    </div>
  </div>`;
}
function qcmDone(){
  const{qs,ans={},lbl=''}=E;
  const score=qs.filter((_,i)=>ans[i]===qs[i].c).length;
  const wrong=qs.flatMap((q,i)=>ans[i]!==q.c?[{level:lbl,question:q.q,userAnswer:ans[i]!=null?q.o[ans[i]]:'—',correctAnswer:q.o[q.c]}]:[]);
  S.wr.push(...wrong);
  if(S.scr==='l1q1'){
    S.res['L1-Ex1']={score,passed:pass(score)};
    if(pass(score)){S.pts+=50;go('l1d');}
    else go('l1q2',{qs:Q2,cur:0,ans:{},done:false,lbl:'L1-Ex2'});
  }else if(S.scr==='l1q2'){
    S.res['L1-Ex2']={score,passed:pass(score)};
    if(pass(score))S.pts+=50;
    go('l1d');
  }else if(S.scr==='l2qm'){
    S.res['L2-QCM']={score,passed:pass(score)};
    if(pass(S.l2s1)&&pass(score)){S.pts+=100;go('l2d');}
    else{S.pts=Math.max(0,S.pts-25);go('l2fl');}
  }
}

/* ═══ MATCHING ═══ */
function vMatch(){
  const{ps,sh,sel,mt={},done=false}=E;
  if(!ps)return'';
  const usedD=Object.values(mt);
  const words=ps.map((p,i)=>{
    const isM=mt[i]!=null,ok2=done&&mt[i]===i,ko=done&&isM&&mt[i]!==i;
    let bc=ok2?'#6BCB77':ko?'#FF6B6B':sel===i?'#C77DFF':isM?'#C77DFF':'#E8E8E8';
    let bg=ok2?'#EDFAEF':ko?'#FFF0F0':sel===i?'#F3E8FF':'#fff';
    return `<div class="mi" onclick="${done||isM?'':`selectW(${i})`}" style="border-color:${bc};background:${bg}${done||isM?';cursor:default':''}">
      <strong style="flex:1">${p.w}</strong>
      ${isM&&!done?'<span style="color:#C77DFF;font-size:.75rem">✓</span>':''}
      ${ok2?'<span style="color:#6BCB77">✓</span>':''}${ko?'<span style="color:#FF6B6B">✗</span>':''}
    </div>`;
  }).join('');
  const defs=sh.map(orig=>{
    const isU=usedD.includes(orig);
    const mKey=Object.keys(mt).find(k=>mt[k]===orig);
    const ok2=done&&mKey!=null&&Number(mKey)===orig;
    const ko=done&&isU&&!ok2;
    return `<div class="mi" onclick="${isU?'':`selectD(${orig})`}" style="border-color:${ok2?'#6BCB77':ko?'#FF6B6B':'#E8E8E8'};background:${ok2?'#EDFAEF':ko?'#FFF0F0':'#fff'}${isU&&!done?';opacity:.45':''}${isU?';cursor:default':''}">${ps[orig].d}</div>`;
  }).join('');
  const allM=Object.keys(mt).length===ps.length;
  const score=ps.filter((_,i)=>mt[i]===i).length;
  const bot=done
    ?`<div style="display:flex;gap:10px;width:100%;align-items:center;flex-wrap:wrap">
       <div class="${score>=8?'ok':'ko'}" style="flex:1;margin:0">${score}/${ps.length} ${score>=8?'✓ Réussi !':'✗ Insuffisant'}</div>
       ${btn('Continuer →','matchDone()','green')}</div>`
    :(allM?btn('✅ Valider',`E.done=true;render()`,'coral'):`<small style="color:#CCC;font-size:.8rem">${Object.keys(mt).length}/${ps.length} associés</small>`);
  return `<p style="color:#AAA;font-size:.83rem;margin-bottom:11px;font-weight:700">① Cliquez un mot → ② Cliquez sa définition</p>
    <div class="mg"><div><div style="font-weight:800;color:#C77DFF;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Mots</div>${words}</div>
    <div><div style="font-weight:800;color:#FF9F43;font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px">Définitions</div>${defs}</div></div>
    <div style="margin-top:13px;display:flex;justify-content:flex-end">${bot}</div>`;
}
function selectW(i){if(E.done||E.mt[i]!=null)return;E.sel=E.sel===i?null:i;render();}
function selectD(orig){
  if(E.done||Object.values(E.mt||{}).includes(orig)||E.sel==null)return;
  if(!E.mt)E.mt={};E.mt[E.sel]=orig;E.sel=null;render();
}
function matchDone(){
  const{ps,mt={},lbl=''}=E;
  const score=ps.filter((_,i)=>mt[i]===i).length;
  const wrong=ps.flatMap((p,i)=>mt[i]!==i?[{level:lbl,question:`Match: ${p.w}`,userAnswer:mt[i]!=null?ps[mt[i]]?.d:'—',correctAnswer:p.d}]:[]);
  S.wr.push(...wrong);
  if(S.scr==='l4e1'){
    S.res['L4-Ex1']={score,passed:pass(score)};
    if(pass(score)){S.pts+=50;go('l4d');}
    else go('l4e2',{ps:M2,sh:shuf(M2.map((_,i)=>i)),sel:null,mt:{},done:false,lbl:'L4-Ex2'});
  }else{
    S.res['L4-Ex2']={score,passed:pass(score)};
    if(pass(score))S.pts+=50;
    go('l4d');
  }
}

/* ═══ ORAL ═══ */
function startOral(){S.l3i=0;go('l3or',{step:'reading'});}
function startRep(){S.l5i=0;go('l5or',{step:'reading'});}
function vOral(content,isRep=false){
  const step=E.step||'reading';
  let body='';
  if(step==='reading'){
    const inner=isRep
      ?`<div class="sit"><div class="slbl">📋 Rapport d'incident</div><div style="font-weight:700;font-size:.95rem;margin-bottom:3px">${content.t}</div><div style="color:#888;font-size:.8rem;margin-bottom:11px">${content.i}</div><div style="font-size:.88rem;line-height:1.75;margin-bottom:11px">${content.x}</div></div>`
      :`<div class="sit"><div class="slbl">📍 Où</div><div class="sval">${content.w}</div><div class="slbl">👤 Qui</div><div class="sval">${content.who}</div><div class="slbl">🎭 Rôle</div><div class="sval">${content.r}</div></div>`;
    body=`${inner}<div class="hint" style="margin-top:13px;margin-bottom:16px">💡 ${content.h}</div><div style="text-align:center"><p style="color:#888;margin-bottom:11px;font-size:.88rem">Lisez la carte, préparez-vous mentalement.</p>${btn('🎤 Je commence','E.step="presenting";render()','coral')}</div>`;
  }else if(step==='presenting'){
    body=`<div style="background:#F0FFFE;border-radius:13px;padding:20px;text-align:center"><p style="font-weight:700;color:#4ECDC4;margin-bottom:15px">L'élève présente son oral en anglais…</p>${btn('👩‍🏫 Validation Professeur','E.step="modal-code";render()','purple')}</div>`;
  }else if(step==='modal-code'){
    body=`<div style="background:#F8F0FF;border:2px solid #C77DFF;border-radius:14px;padding:22px">
      <div style="text-align:center;margin-bottom:16px"><div style="font-size:2.2rem">👩‍🏫</div><h3 style="color:#4ECDC4;font-weight:800;margin-top:5px">Validation Professeur</h3><p style="color:#888;font-size:.83rem;margin-top:3px">Entrez votre code pour valider l'oral</p></div>
      <input id="tc" type="password" placeholder="Code professeur" style="margin-bottom:9px" onkeydown="if(event.key==='Enter')checkTC()">
      <div id="tcerr" style="color:#FF6B6B;font-weight:700;font-size:.85rem;min-height:18px;margin-bottom:8px"></div>
      ${btn('Valider le code →','checkTC()','blue',true)}
    </div>`;
  }else if(step==='modal-validate'){
    body=`<div style="background:#F8F0FF;border:2px solid #C77DFF;border-radius:14px;padding:22px;text-align:center">
      <div style="font-size:2.2rem;margin-bottom:8px">🎤</div>
      <h3 style="color:#FF9F43;font-weight:800;margin-bottom:5px">Résultat de l'oral</h3>
      <p style="color:#888;font-size:.83rem;margin-bottom:18px">L'élève a-t-il réussi ?</p>
      <div style="display:flex;gap:14px">${btn('✅ Réussi','oralPass()','green',true)}${btn('❌ À refaire','oralFail()','coral',true)}</div>
    </div>`;
  }
  return `<div class="c"><div style="text-align:center;margin-bottom:14px"><div style="font-size:2rem">${content.e}</div><h3 style="font-weight:800;color:#FF9F43;font-size:1.3rem;margin-top:4px">${content.t}</h3></div>${body}</div>`;
}
function checkTC(){
  const v=(document.getElementById('tc')||{}).value||'';
  if(v===S.tc){E.step='modal-validate';render();}
  else{const el=document.getElementById('tcerr');if(el)el.textContent='Code incorrect';}
}
function oralPass(){
  if(S.scr==='l3or'){S.res['L3-Oral']={passed:true};S.pts+=50;go('l3d');}
  else{S.res['L5-Oral']={passed:true};S.pts+=50;go('l5d');}
}
function oralFail(){
  if(S.scr==='l3or'){
    S.res['L3-Oral']={passed:false};
    if((S.l3i||0)<SIT.length-1){S.l3i++;E={step:'reading'};render();}
    else go('l3d');
  }else{
    S.res['L5-Oral']={passed:false};
    if((S.l5i||0)<REP.length-1){S.l5i++;E={step:'reading'};render();}
    else go('l5d');
  }
}

/* ═══ FINAL CODE ═══ */
function vFinal(){
  const chips=S.rv.map(w=>`<span style="background:#FF9F43;color:#fff;padding:6px 15px;border-radius:50px;font-weight:800;display:inline-block;margin:3px">${w}</span>`).join('');

    <div id="ferr" style="color:#FF6B6B;font-weight:700;font-size:.85rem;min-height:18px;margin-bottom:10px"></div>

function checkFinal(){
  const v=((document.getElementById('fc')||{}).value||'').trim().toUpperCase().replace(/\s+/g,' ');

  else{const el=document.getElementById('ferr');if(el)el.textContent=`❌ Code incorrect. Réarrangez vos ${S.rv.length} fragments !`;}
}

      <div style="background:#FFF8EE;padding:13px;border-radius:12px;text-align:center"><div style="font-size:1.45rem;font-weight:800;color:#4ECDC4">${dur}</div><div style="color:#888;font-size:.83rem">Durée</div></div>

/* ═══ REPORT ═══ */
function vReport(){
  const dur=ftm(S.t0,S.t1);
  const parts=S.g.p.map(p=>`<span style="background:#4ECDC4;color:#fff;padding:3px 10px;border-radius:50px;font-size:.78rem;font-weight:700">${p.fn}-${p.ln}</span>`).join(' ');
  const LN={'L1-Ex1':'📝 Vocabulaire Ex.1','L1-Ex2':'📝 Vocabulaire (Rattrapage)','L2-VF':'📖 Lecture V/F','L2-QCM':'📖 Lecture QCM','L3-Oral':'🎤 Expression orale','L4-Ex1':'🔗 Correspondance Ex.1','L4-Ex2':'🔗 Correspondance (Rattrapage)','L5-Oral':'📋 Compte rendu oral'};
  const rows=Object.entries(S.res).map(([k,v])=>`<tr style="border-bottom:1px solid #F0F0F0">
    <td style="padding:9px;font-weight:700;font-size:.87rem">${LN[k]||k}</td>
    <td style="padding:9px"><span style="background:${v.passed?'#6BCB77':'#FF6B6B'};color:#fff;padding:2px 9px;border-radius:50px;font-size:.75rem;font-weight:800">${v.passed?'✓ Réussi':'✗ Non réussi'}</span></td>
    <td style="padding:9px;color:#888;font-size:.87rem">${v.score!=null?`${v.score}/10`:typeof v.passed==='boolean'?(v.passed?'Oral réussi':'Non réussi'):'—'}</td>
  </tr>`).join('');

    ?`<div class="ok" style="text-align:center">🏆 Aucune erreur !</div>`

  return `<div id="report" style="max-width:760px;margin:0 auto;padding:20px">
    <div class="noprint" style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap">
      ${btn('← Retour victoire',"go('vic')",'gray')}

      <div style="opacity:.9;font-size:.9rem;margin-top:4px">English Escape Game — Bac Pro AEPA • Rapport de mission</div>

      <div class="c" style="text-align:center"><div style="font-weight:800;font-size:1rem;color:#333">${S.g.n}</div><div style="color:#888;font-size:.8rem">Groupe</div></div>
      <div class="c" style="text-align:center"><div style="font-size:1.8rem;font-weight:800;color:#FF6B6B">${S.pts}</div><div style="color:#888;font-size:.8rem">Points / Durée : ${dur}</div></div>
    </div>
    <div class="c"><div style="font-weight:800;margin-bottom:8px">👥 Participants</div>${parts}</div>
    <div class="c">
      <h3 style="font-weight:800;color:#FF9F43;margin-bottom:12px">🎯 Résultats par niveau</h3>
      <table style="width:100%;border-collapse:collapse">
        <tr style="background:#FFF8EE"><th style="padding:9px;text-align:left;font-size:.82rem;font-weight:800">Niveau</th><th style="padding:9px;text-align:left;font-size:.82rem;font-weight:800">Résultat</th><th style="padding:9px;text-align:left;font-size:.82rem;font-weight:800">Score</th></tr>

}
